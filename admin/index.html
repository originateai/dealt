<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard | Dealt</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Rubik:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --navy:#0D1B2E; --blue:#175CF5; --blue-light:#D1DEFF;
      --dark-grey:#69707F; --mid-grey:#BFC5D2; --light-bg:#F4F6FC;
      --white:#FFFFFF; --sidebar-w:220px;
      --shadow-sm:0 1px 4px rgba(23,92,245,0.08);
    }
    *{margin:0;padding:0;box-sizing:border-box;}
    body{font-family:'Rubik',sans-serif;background:var(--light-bg);color:var(--navy);display:flex;min-height:100vh;}

    .sidebar{width:var(--sidebar-w);background:var(--navy);min-height:100vh;position:fixed;left:0;top:0;bottom:0;display:flex;flex-direction:column;padding:24px 0;}
    .sidebar-logo{padding:0 20px 28px;display:flex;align-items:center;gap:10px;}
    .sidebar-logo img{height:24px;filter:brightness(0) invert(1);}
    .sidebar-logo-fb{font-size:18px;font-weight:700;color:white;letter-spacing:-0.5px;}
    .nav-section{flex:1;padding:0 10px;}
    .nav-item{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:8px;font-size:13px;font-weight:500;color:rgba(255,255,255,0.5);text-decoration:none;transition:all .15s;margin-bottom:2px;}
    .nav-item:hover{color:rgba(255,255,255,0.85);background:rgba(255,255,255,0.06);}
    .nav-item.active{color:white;background:var(--blue);}
    .nav-item svg{width:16px;height:16px;flex-shrink:0;}
    .sidebar-footer{padding:16px 20px;border-top:1px solid rgba(255,255,255,0.08);}
    .user-row{display:flex;align-items:center;gap:10px;}
    .user-av{width:30px;height:30px;background:var(--blue);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:white;flex-shrink:0;}
    .user-name{font-size:12px;color:rgba(255,255,255,0.75);font-weight:500;}
    .user-email{font-size:11px;color:rgba(255,255,255,0.35);}

    .main{margin-left:var(--sidebar-w);flex:1;padding:36px 40px;}
    .page-head{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:28px;}
    .page-head h1{font-size:24px;font-weight:700;letter-spacing:-0.4px;margin-bottom:5px;}
    .page-head p{font-size:13px;color:var(--dark-grey);}

    .btn-primary{padding:11px 20px;background:var(--blue);color:white;border:none;border-radius:8px;font-family:'Rubik',sans-serif;font-size:13px;font-weight:600;cursor:pointer;display:flex;align-items:center;gap:7px;text-decoration:none;transition:background .2s,transform .15s;}
    .btn-primary:hover{background:#1350D9;transform:translateY(-1px);}

    /* STATS */
    .stats{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:28px;}
    .stat-card{background:var(--white);border-radius:12px;padding:18px 16px;box-shadow:var(--shadow-sm);position:relative;overflow:hidden;}
    .stat-card::before{content:'';position:absolute;top:0;left:0;width:100%;height:3px;background:var(--blue-light);}
    .stat-card.hi::before{background:var(--blue);}
    .stat-lbl{font-size:11px;font-weight:600;color:var(--dark-grey);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:8px;}
    .stat-val{font-size:28px;font-weight:700;color:var(--navy);letter-spacing:-0.5px;}
    .stat-val.blue{color:var(--blue);}
    .stat-sub{font-size:11px;color:var(--mid-grey);margin-top:3px;}

    /* TABLE */
    .table-card{background:var(--white);border-radius:14px;box-shadow:var(--shadow-sm);overflow:hidden;}
    .table-head{padding:18px 20px;border-bottom:1px solid var(--blue-light);display:flex;align-items:center;justify-content:space-between;}
    .table-head h2{font-size:15px;font-weight:600;}

    .search{padding:9px 13px;border:1.5px solid var(--mid-grey);border-radius:8px;font-family:'Rubik',sans-serif;font-size:13px;color:var(--navy);outline:none;transition:border-color .2s;width:200px;}
    .search:focus{border-color:var(--blue);}

    table{width:100%;border-collapse:collapse;}
    th{font-size:11px;font-weight:600;color:var(--dark-grey);text-transform:uppercase;letter-spacing:0.5px;padding:11px 20px;text-align:left;background:#FAFBFE;border-bottom:1px solid var(--blue-light);}
    td{padding:13px 20px;font-size:13px;border-bottom:1px solid #F0F2F8;vertical-align:middle;}
    tr:last-child td{border-bottom:none;}
    tr:hover td{background:#FAFBFE;}

    .addr-main{font-weight:500;color:var(--navy);}
    .addr-slug{font-size:11px;color:var(--mid-grey);margin-top:2px;font-family:monospace;}

    .badge{display:inline-block;padding:3px 9px;border-radius:20px;font-size:11px;font-weight:600;}
    .badge-active{background:#E6F0FF;color:var(--blue);}
    .badge-draft{background:#F4F6FC;color:var(--dark-grey);}

    .leads-n{font-weight:600;}
    .leads-n.has{color:var(--blue);}

    .act-btns{display:flex;gap:6px;}
    .act-btn{padding:5px 11px;border-radius:6px;font-size:12px;font-weight:500;cursor:pointer;border:1.5px solid;text-decoration:none;display:inline-flex;align-items:center;gap:4px;transition:all .15s;}
    .copy-btn{border-color:var(--mid-grey);color:var(--dark-grey);}
    .copy-btn:hover{border-color:var(--blue);color:var(--blue);}
    .view-btn{border-color:var(--navy);color:var(--navy);}
    .view-btn:hover{background:var(--navy);color:white;}

    .empty{padding:60px 20px;text-align:center;}
    .empty h3{font-size:17px;font-weight:600;margin-bottom:8px;}
    .empty p{font-size:13px;color:var(--dark-grey);margin-bottom:18px;}

    .spinner{width:30px;height:30px;border:3px solid var(--blue-light);border-top-color:var(--blue);border-radius:50%;animation:spin .75s linear infinite;margin:40px auto;}
    @keyframes spin{to{transform:rotate(360deg);}}
  </style>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    (function() {
      const SUPABASE_URL = 'YOUR_SUPABASE_URL';
      const SUPABASE_ANON_KEY = 'YOUR_SUPABASE_ANON_KEY';
      const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
      sb.auth.getSession().then(({ data }) => {
        if (!data.session) window.location.href = 'login.html';
      });
      window._sb = sb;
      window.logout = async function() {
        await sb.auth.signOut();
        window.location.href = 'login.html';
      };
    })();
  </script>

</head>
<body>

  <nav class="sidebar">
    <div class="sidebar-logo">
      <img src="../dealt-logo.png" alt="Dealt" onerror="this.style.display='none';document.getElementById('lf').style.display='block'">
      <span id="lf" class="sidebar-logo-fb" style="display:none">dealt</span>
    </div>
    <div class="nav-section">
      <a href="index.html" class="nav-item active">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
        Dashboard
      </a>
      <a href="create-deal.html" class="nav-item">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/></svg>
        New Deal
      </a>
      <a href="deals.html" class="nav-item">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
        All Deals
      </a>
      <a href="leads.html" class="nav-item">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 00-3-3.87M16 3.13a4 4 0 010 7.75"/></svg>
        Leads
      </a>
    </div>
    <div class="sidebar-footer">
      <div class="user-row">
        <div class="user-av">JS</div>
        <div>
          <div class="user-name">James Storey</div>
          <div class="user-email">info@dealt.com.au</div>
        <button onclick="logout()" style="margin-top:10px;width:100%;padding:8px;background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.15);border-radius:7px;color:rgba(255,255,255,0.5);font-family:Rubik,sans-serif;font-size:12px;cursor:pointer;">Sign Out</button>
        </div>
      </div>
    </div>
  </nav>

  <main class="main">
    <div class="page-head">
      <div>
        <h1>Dashboard</h1>
        <p>Finance flyers and incoming leads</p>
      </div>
      <a href="create-deal.html" class="btn-primary">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        New Deal
      </a>
    </div>

    <div class="stats">
      <div class="stat-card hi">
        <div class="stat-lbl">Active Flyers</div>
        <div class="stat-val blue" id="sFlyers">—</div>
        <div class="stat-sub">Live deal pages</div>
      </div>
      <div class="stat-card">
        <div class="stat-lbl">Total Leads</div>
        <div class="stat-val" id="sLeads">—</div>
        <div class="stat-sub">All time</div>
      </div>
      <div class="stat-card">
        <div class="stat-lbl">Docs Uploaded</div>
        <div class="stat-val" id="sDocs">—</div>
        <div class="stat-sub">From prospects</div>
      </div>
      <div class="stat-card">
        <div class="stat-lbl">HubSpot Synced</div>
        <div class="stat-val" id="sSynced">—</div>
        <div class="stat-sub">Contacts created</div>
      </div>
    </div>

    <div class="table-card">
      <div class="table-head">
        <h2>Recent Deals</h2>
        <input type="text" class="search" placeholder="Search address…" oninput="filter(this.value)">
      </div>
      <div id="tableWrap"><div class="spinner"></div></div>
    </div>
  </main>

  <script>
    let allDeals = [];

    async function load() {
      try {
        const r = await fetch('/.netlify/functions/list-deals');
        const d = await r.json();
        allDeals = d.deals || [];
        renderStats(d.stats || {});
        renderTable(allDeals);
      } catch {
        document.getElementById('tableWrap').innerHTML =
          '<div class="empty"><h3>Could not load</h3><p>Check your connection.</p></div>';
      }
    }

    function renderStats(s) {
      document.getElementById('sFlyers').textContent  = s.active_deals  ?? allDeals.length;
      document.getElementById('sLeads').textContent   = s.total_leads   ?? '—';
      document.getElementById('sDocs').textContent    = s.total_docs    ?? '—';
      document.getElementById('sSynced').textContent  = s.hubspot_synced ?? '—';
    }

    function renderTable(deals) {
      if (!deals.length) {
        document.getElementById('tableWrap').innerHTML = `
          <div class="empty">
            <div style="font-size:36px;margin-bottom:12px">📄</div>
            <h3>No deals yet</h3>
            <p>Create your first finance flyer to get started.</p>
            <a href="create-deal.html" class="btn-primary" style="display:inline-flex;margin:0 auto">Create First Deal</a>
          </div>`; return;
      }

      document.getElementById('tableWrap').innerHTML = `
        <table>
          <thead><tr>
            <th>Property</th><th>Type</th><th>Loan</th><th>Rate</th>
            <th>Leads</th><th>Status</th><th>Created</th><th>Actions</th>
          </tr></thead>
          <tbody>${deals.map(d=>`
            <tr>
              <td><div class="addr-main">${d.address}</div><div class="addr-slug">${d.slug}</div></td>
              <td>${d.finance_type||'—'}</td>
              <td>${fmt(d.loan_amount)}</td>
              <td>${d.rate_from?d.rate_from+'%':'—'}</td>
              <td><span class="leads-n ${d.leads_count>0?'has':''}">${d.leads_count||0}</span></td>
              <td><span class="badge ${d.is_active?'badge-active':'badge-draft'}">${d.is_active?'Active':'Draft'}</span></td>
              <td>${new Date(d.created_at).toLocaleDateString('en-AU',{day:'numeric',month:'short',year:'2-digit'})}</td>
              <td>
                <div class="act-btns">
                  <button class="act-btn copy-btn" onclick="copy('${d.slug}')">Copy</button>
                  <a class="act-btn view-btn" href="/?d=${d.slug}" target="_blank">View →</a>
                </div>
              </td>
            </tr>`).join('')}
          </tbody>
        </table>`;
    }

    function filter(q) {
      renderTable(allDeals.filter(d=>d.address.toLowerCase().includes(q.toLowerCase())));
    }

    function copy(slug) {
      navigator.clipboard.writeText(`${location.origin}/?d=${slug}`)
        .then(()=>alert('Link copied to clipboard'));
    }

    function fmt(n) {
      if (!n) return '—';
      if (n>=1e6) return `$${(n/1e6).toFixed(2)}M`;
      if (n>=1e3) return `$${(n/1e3).toFixed(0)}K`;
      return `$${n.toLocaleString()}`;
    }

    load();
  </script>
</body>
</html>
